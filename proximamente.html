    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; }

    /* Animated gradient background */
    .bg-animated {
      background: linear-gradient(135deg, #3D3356 0%, #4F446C 40%, #634E77 70%, #3D3356 100%);
      background-size: 300% 300%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Decorative orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }

    /* Pulsing shield icon */
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }
    .shield-pulse { animation: pulseGlow 3s ease-in-out infinite; }

    /* Progress bar animation */
    @keyframes progressFill {
      from { width: 0%; }
      to   { width: 72%; }
    }
    .progress-bar { animation: progressFill 2s cubic-bezier(.22,1,.36,1) 0.5s both; }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both; }
    .delay-1   { animation-delay: 0.12s; }
    .delay-2   { animation-delay: 0.26s; }
    .delay-3   { animation-delay: 0.42s; }
    .delay-4   { animation-delay: 0.58s; }
    .delay-5   { animation-delay: 0.74s; }
  </style>
